<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지혜의 창</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* ─────── 5개 팔레트 ─────── */
  /* JS에서 랜덤 선택해서 :root에 주입함 */
  :root {
    --bg:#ffffff;
    --bg2:#fafafa;
    --bg3:#f5f5f5;
    --border:#efefef;
    --border2:#e0e0e0;
    --text:#1a1a1a;
    --text2:#737373;
    --text3:#a8a8a8;
    --accent:#1a1a1a;
    --accent-soft:#fafafa;
    --radius:10px;
    --radius-lg:14px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard Variable','Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    font-size:14px;
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease;
  }

  /* ─────── 상단 바 ─────── */
  .top-bar{
    position:sticky;
    top:0;
    z-index:200;
    background:rgba(255,255,255,0.85);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
  }
  .top-bar-inner{
    max-width:680px;
    margin:0 auto;
    padding:14px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
  }

  /* ─────── 로고 ─────── */
  .logo{
    display:flex;
    flex-direction:column;
    gap:2px;
    cursor:default;
  }
  .logo-main{
    font-family:'Noto Serif KR',serif;
    font-size:18px;
    font-weight:400;
    letter-spacing:-0.01em;
    color:var(--text);
    line-height:1;
  }
  .logo-sub{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:10px;
    letter-spacing:0.25em;
    color:var(--text3);
    text-transform:uppercase;
  }

  /* ─────── 검색창 ─────── */
  .search-wrap{
    flex:1;
    position:relative;
    max-width:300px;
  }
  .search-wrap input{
    width:100%;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:8px 14px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    outline:none;
    transition:all .15s;
  }
  .search-wrap input:focus{
    background:var(--bg);
    border-color:var(--accent);
  }
  .search-wrap input::placeholder{color:var(--text3);}

  /* ─────── 리마인드 버튼 ─────── */
  .btn{
    border:none;
    cursor:pointer;
    font-family:inherit;
    transition:all .15s;
    border-radius:var(--radius);
  }
  .btn-remind{
    background:transparent;
    color:var(--text);
    padding:6px 8px;
    font-size:18px;
  }
  .btn-remind:hover{transform:scale(1.1);}

  /* ─────── 메인 컨테이너 ─────── */
  .main{
    max-width:680px;
    margin:0 auto;
    padding:0 20px;
  }

  /* ─────── 탭 (책갈피 X, 인스타 스타일) ─────── */
  .tabs{
    display:flex;
    border-bottom:1px solid var(--border);
    margin-top:8px;
    position:relative;
  }
  .tab{
    flex:1;
    padding:14px 12px;
    text-align:center;
    background:transparent;
    border:none;
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    color:var(--text2);
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
    letter-spacing:0.02em;
    transition:all .15s;
  }
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text);border-bottom-color:var(--text);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* ─────── 카운트 라벨 ─────── */
  .count-label{
    font-size:11px;
    color:var(--text3);
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:18px 0 10px;
  }

  /* ─────── 폼 카드 ─────── */
  .form-card{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:18px;
    margin:12px 0 20px;
  }
  .form-title{
    font-family:'Noto Serif KR',serif;
    font-size:13px;
    font-weight:500;
    margin-bottom:14px;
    color:var(--text);
    letter-spacing:-0.01em;
  }
  .form-grid{display:flex;flex-direction:column;gap:10px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{width:100%;}
  label{
    font-size:11px;
    color:var(--text3);
    font-weight:500;
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  /* ─────── 입력란 ─────── */
  input[type="text"],input[type="url"],textarea{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 12px;
    color:var(--text);
    font-family:inherit;
    font-size:13.5px;
    transition:all .15s;
    outline:none;
    resize:none;
    width:100%;
  }
  input:focus,textarea:focus{border-color:var(--accent);}
  input::placeholder,textarea::placeholder{color:var(--text3);}

  /* ─────── 태그 입력 박스 ─────── */
  .tag-input-wrap{position:relative;}
  .tag-input-box{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    align-items:center;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    min-height:38px;
    cursor:text;
    transition:all .15s;
  }
  .tag-input-box:focus-within{border-color:var(--accent);}
  .tag-input-real{
    border:none!important;
    background:transparent!important;
    padding:1px 2px!important;
    min-width:60px;
    flex:1;
    font-size:13px;
    outline:none;
    color:var(--text);
  }
  .tag-pill{
    display:flex;
    align-items:center;
    gap:4px;
    padding:3px 9px;
    border-radius:14px;
    font-size:12px;
    color:#fff;
  }
  .tag-pill .tag-x{cursor:pointer;opacity:.7;padding:0 2px;}
  .tag-pill .tag-x:hover{opacity:1;}

  /* ─────── 태그 드롭다운 ─────── */
  .tag-dropdown{
    display:none;
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    right:0;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 4px 16px rgba(0,0,0,0.06);
    max-height:200px;
    overflow-y:auto;
    z-index:50;
  }
  .tag-dropdown.show{display:block;}
  .tag-dropdown-item{
    padding:8px 12px;
    cursor:pointer;
    font-size:13px;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .12s;
  }
  .tag-dropdown-item:hover{background:var(--bg2);}
  .tag-dot{width:8px;height:8px;border-radius:50%;}
  .tag-cnt{margin-left:auto;color:var(--text3);font-size:11px;}

  /* ─────── 자동 태그 미리보기 ─────── */
  .auto-tags-preview{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
  .auto-tag-badge{padding:2px 8px;border-radius:14px;font-size:11px;color:#fff;}

  /* ─────── 카테고리 select ─────── */
  .note-category-select{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 12px;
    font-family:inherit;
    font-size:13.5px;
    color:var(--text);
    outline:none;
    cursor:pointer;
    transition:all .15s;
    width:100%;
  }
  .note-category-select:focus{border-color:var(--accent);}

  /* ─────── 저장 버튼 ─────── */
  .btn-primary{
    background:var(--text);
    color:#fff;
    padding:10px 20px;
    font-size:13px;
    font-weight:500;
    letter-spacing:0.02em;
  }
  .btn-primary:hover{opacity:0.85;}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}

  /* ─────── 카드 (인스타 스타일) ─────── */
  .grid{display:flex;flex-direction:column;gap:0;}
  .card{
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:16px 4px;
    transition:background .12s;
  }
  .card:hover{background:var(--bg2);}
  .card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
  }
  .card-type{
    font-size:10px;
    font-weight:500;
    color:var(--text3);
    letter-spacing:0.15em;
    text-transform:uppercase;
  }
  .card-edit{
    background:transparent;
    border:none;
    color:var(--text3);
    cursor:pointer;
    padding:4px 6px;
    border-radius:50%;
    font-size:18px;
    line-height:1;
    transition:all .15s;
  }
  .card-edit:hover{background:var(--bg3);color:var(--text);}
  .card-title{
    font-size:15px;
    font-weight:500;
    line-height:1.4;
    color:var(--text);
    margin-bottom:4px;
    cursor:pointer;
    letter-spacing:-0.01em;
  }
  .card-title:hover{color:var(--text2);}
  .card-memo{
    font-size:13px;
    color:var(--text2);
    line-height:1.5;
    margin-bottom:10px;
  }
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;}
  .tag-badge{
    padding:2px 8px;
    border-radius:14px;
    font-size:12px;
    color:#fff;
  }

  /* ─────── 메모 카드 ─────── */
  .note-card{
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:16px 4px;
    transition:background .12s;
  }
  .note-card:hover{background:var(--bg2);}
  .note-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .note-category-badge{
    font-size:10px;
    font-weight:500;
    color:var(--text3);
    letter-spacing:0.05em;
    padding:3px 9px;
    background:var(--bg3);
    border-radius:12px;
  }
  .note-body{
    font-size:14px;
    color:var(--text);
    line-height:1.6;
    margin-bottom:10px;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .note-body a{color:var(--accent);text-decoration:underline;}
  .note-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .note-tags{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
  .note-actions{display:flex;gap:8px;}
  .note-action-btn{
    background:transparent;
    border:none;
    cursor:pointer;
    color:var(--text3);
    font-size:11px;
    padding:2px 6px;
    transition:color .12s;
  }
  .note-action-btn:hover{color:var(--text);}
  .note-action-btn.delete:hover{color:#c9847a;}

  /* ─────── 메모 카테고리 컬러 (모노톤) ─────── */
  .note-cat-아이디어,
  .note-cat-명언,
  .note-cat-영감,
  .note-cat-음식,
  .note-cat-일반{background:var(--bg3);color:var(--text2);}

  /* ─────── 더보기 ─────── */
  #show-all-wrap{text-align:center;padding:16px 0 24px;}
  .show-more-btn{
    background:transparent;
    border:1px solid var(--border2);
    color:var(--text);
    border-radius:20px;
    padding:7px 18px;
    font-size:12.5px;
    font-weight:500;
    cursor:pointer;
    font-family:inherit;
    transition:all .15s;
  }
  .show-more-btn:hover{background:var(--bg2);}

  /* ─────── 필터 영역 (검색창 클릭 시 드롭다운) ─────── */
  .filter-row{
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
    z-index:300;
    max-height:240px;
    overflow-y:auto;
  }
  .filter-row.collapsed{display:none;}
  .filter-label{
    font-size:11px;
    color:var(--text3);
    font-weight:500;
    letter-spacing:0.05em;
    text-transform:uppercase;
  }
  .filter-toggle-btn{
    background:transparent;
    border:none;
    color:var(--text3);
    font-size:11px;
    cursor:pointer;
    padding:3px 8px;
    border-radius:10px;
    font-family:inherit;
    transition:all .12s;
  }
  .filter-toggle-btn:hover{background:var(--bg2);color:var(--text);}
  .filter-chip{
    display:flex;
    align-items:center;
    gap:5px;
    padding:4px 11px;
    border-radius:14px;
    font-size:12px;
    color:#fff;
    border:none;
    cursor:pointer;
    transition:opacity .15s;
  }
  .filter-chip:hover{opacity:0.85;}
  .filter-chip.active{background:var(--text)!important;color:#fff;font-weight:500;}
  .filter-chip-mono{background:var(--bg3);color:var(--text);}
  .filter-chip-mono.active{background:var(--text)!important;color:#fff;}
  .filter-cnt{opacity:.7;font-size:11px;}

  /* ─────── 모달 ─────── */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:1000;
    align-items:center;
    justify-content:center;
    padding:20px;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--bg);
    border-radius:var(--radius-lg);
    padding:24px;
    width:100%;
    max-width:480px;
    max-height:90vh;
    overflow-y:auto;
  }
  .modal-title{
    font-family:'Noto Serif KR',serif;
    font-size:18px;
    font-weight:500;
    margin-bottom:18px;
    letter-spacing:-0.01em;
  }
  .modal-group{margin-bottom:14px;display:flex;flex-direction:column;gap:5px;}
  .modal-meta{
    font-size:11px;
    color:var(--text3);
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--border);
  }
  .modal-actions{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:22px;
  }
  .btn-ghost{
    background:transparent;
    color:var(--text2);
    padding:9px 16px;
    font-size:13px;
    font-weight:500;
  }
  .btn-ghost:hover{background:var(--bg2);color:var(--text);}
  .btn-danger{
    background:transparent;
    color:#c9847a;
    padding:9px 14px;
    font-size:13px;
    font-weight:500;
  }
  .btn-danger:hover{background:#fbf0ee;}

  /* ─────── 검색 배너 ─────── */
  .search-mode-banner{
    display:none;
    align-items:center;
    justify-content:space-between;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 14px;
    margin-top:12px;
    font-size:12px;
    color:var(--text2);
  }

  /* ─────── 로딩/상태 ─────── */
  .status-msg{
    text-align:center;
    color:var(--text3);
    padding:40px 20px;
    font-size:13px;
  }
  .loading{
    display:inline-block;
    width:14px;
    height:14px;
    border:2px solid var(--border);
    border-top-color:var(--text);
    border-radius:50%;
    animation:spin .8s linear infinite;
    vertical-align:middle;
    margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ─────── 토스트 ─────── */
  .toast-msg{
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    background:var(--text);
    color:#fff;
    padding:10px 18px;
    border-radius:24px;
    font-size:13px;
    font-weight:500;
    z-index:9999;
    display:none;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);
  }
  .toast-msg.show{display:block;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}

  /* ─────── 리마인드 토스트 ─────── */
  .remind-toast{
    position:fixed;
    bottom:24px;
    right:24px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:18px 20px;
    max-width:300px;
    z-index:999;
    display:none;
    box-shadow:0 12px 36px rgba(0,0,0,0.12);
  }
  .remind-toast.show{display:block;animation:slideUp .25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .remind-close{
    position:absolute;
    top:8px;
    right:10px;
    background:transparent;
    border:none;
    color:var(--text3);
    cursor:pointer;
    font-size:18px;
    padding:4px;
  }
  .remind-close:hover{color:var(--text);}
  .remind-label{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:11px;
    color:var(--text3);
    letter-spacing:0.15em;
    margin-bottom:8px;
    text-transform:uppercase;
  }
  .remind-title{
    font-size:14px;
    font-weight:500;
    margin-bottom:6px;
    cursor:pointer;
  }
  .remind-meta{font-size:11px;color:var(--text3);}

  /* ─────── 반응형 ─────── */
  @media (max-width:480px){
    .top-bar-inner{padding:12px 16px;gap:10px;}
    .main{padding:0 16px;}
    .logo-main{font-size:16px;}
    .logo-sub{font-size:9px;}
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <div class="logo">
      <div class="logo-main">지혜의 창</div>
      <div class="logo-sub">Window of Wisdom</div>
    </div>
    <div class="search-wrap">
      <input type="text" id="global-search" placeholder="검색하거나 태그로 필터..." oninput="globalSearch(this.value)" onfocus="expandFilterRow()" autocomplete="off">
      <div class="filter-row collapsed" id="filter-row" onclick="event.stopPropagation()"></div>
    </div>
    <button class="btn btn-remind" onclick="showRemind()" aria-label="리마인드">🔥</button>
  </div>
</div>

<main class="main">
  <div class="tabs" id="main-tabs">
    <button class="tab active" onclick="switchTab('links',this)">링크 / 아이디어</button>
    <button class="tab" onclick="switchTab('notes',this)">메모</button>
  </div>

  <!-- 링크 탭 -->
  <div class="tab-content active" id="tab-links">
    <div class="form-card" id="add-form-card">
      <div class="form-title">새 콘텐츠 저장</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>URL *</label>
          <input type="url" id="inp-url" placeholder="https://... 붙여넣으면 태그 자동 추가" oninput="onUrlInput(this.value)">
          <div class="auto-tags-preview" id="auto-tags-preview"></div>
        </div>
        <div class="form-group">
          <label>제목 *</label>
          <input type="text" id="inp-title" placeholder="콘텐츠 제목">
        </div>
        <div class="form-group">
          <label>태그</label>
          <div class="tag-input-wrap">
            <div class="tag-input-box" id="tag-box" onclick="document.getElementById('tag-real').focus()">
              <input type="text" id="tag-real" class="tag-input-real" placeholder="입력 후 스페이스" oninput="onTagInput(this.value)" onkeydown="onTagKey(event)" onblur="onTagBlur(event)" onfocus="onTagInput(this.value)" autocomplete="off">
            </div>
            <div class="tag-dropdown" id="tag-dropdown"></div>
          </div>
        </div>
        <div class="form-group full">
          <label>메모</label>

<script>
const API='https://script.google.com/macros/s/AKfycbyroALIBiIL2v_EEe4FGT6-4PS2uxLLmrhxyMq-NLvcDA1T_CMJP-RqxTYqzGXOeOZbSA/exec';
const TAG_COLORS=['#ff5c35','#00b89c','#6c5ce7','#f59e0b','#3b82f6','#ec4899','#10b981','#f97316','#06b6d4','#84cc16'];
const tagColorMap={};
function getTagColor(tag){if(!tagColorMap[tag])tagColorMap[tag]=TAG_COLORS[Object.keys(tagColorMap).length%TAG_COLORS.length];return tagColorMap[tag];}

// ─────── 5개 컬러 팔레트 (접속마다 랜덤) ───────
const PALETTES=[
  {name:'terracotta',bg:'#faf6ef',bg2:'#f5f0e6',bg3:'#ede5d4',border:'#e8e0d0',border2:'#d4c8b0',text:'#3d1f1a',text2:'#7a5c4d',text3:'#a89580',accent:'#c97b5a',accentSoft:'#fbf0ec'},
  {name:'sky',bg:'#fafcfe',bg2:'#f0f5f9',bg3:'#e4ecf2',border:'#e0eaf0',border2:'#c8d6e0',text:'#0f2a3d',text2:'#5a7a8c',text3:'#9ab0bf',accent:'#4a90b8',accentSoft:'#eaf3fa'},
  {name:'sage',bg:'#fafcf6',bg2:'#f2f5e8',bg3:'#e8ecda',border:'#e4e8d6',border2:'#cdd3b3',text:'#2a3318',text2:'#5a6447',text3:'#9aa380',accent:'#8a9b6e',accentSoft:'#eef2e2'},
  {name:'mocha',bg:'#fdfaf3',bg2:'#f5efe2',bg3:'#ebe2cf',border:'#e8dfcb',border2:'#d4c5a3',text:'#2e1d0a',text2:'#6b5a3f',text3:'#a89a7f',accent:'#a87f4a',accentSoft:'#f7efde'},
  {name:'pink',bg:'#fefaf9',bg2:'#fbf0ee',bg3:'#f5e3df',border:'#ece0db',border2:'#dbc4bf',text:'#3d1f1c',text2:'#7c5a55',text3:'#b59a95',accent:'#c9847a',accentSoft:'#fbf0ee'}
];
function applyRandomPalette(){
  const p=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const r=document.documentElement;
  r.style.setProperty('--bg',p.bg);r.style.setProperty('--bg2',p.bg2);r.style.setProperty('--bg3',p.bg3);
  r.style.setProperty('--border',p.border);r.style.setProperty('--border2',p.border2);
  r.style.setProperty('--text',p.text);r.style.setProperty('--text2',p.text2);r.style.setProperty('--text3',p.text3);
  r.style.setProperty('--accent',p.accent);r.style.setProperty('--accent-soft',p.accentSoft);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',p.bg);
}
applyRandomPalette();

let allItems=[],activeTagFilters=[],currentTags=[],editTags=[],currentLimit=4;

// ── 리마인드 큐 ──
let remindQueue=[];
let remindIdx=0;
let remindPrefetching=false;

async function prefetchRemind(){
  if(remindPrefetching||allItems.length===0)return;
  remindPrefetching=true;
  const needed=5-remindQueue.length;
  for(let i=0;i<needed;i++){
    const item=allItems[Math.floor(Math.random()*allItems.length)];
    remindQueue.push(item);
  }
  remindPrefetching=false;
}

function showRemind(){
  if(remindQueue.length===0){
    if(allItems.length===0){showToast('저장된 콘텐츠가 없습니다');return;}
    prefetchRemind();
  }
  displayRemind();
}

function displayRemind(){
  if(remindQueue.length===0){showToast('잠시 후 다시 눌러주세요');return;}
  const item=remindQueue[0];
  document.getElementById('remind-title').textContent=item.title||'';
  document.getElementById('remind-memo').textContent=item.memo||'';
  document.getElementById('remind-open').onclick=()=>window.open(item.url,'_blank');
  document.getElementById('remind-queue').textContent=remindQueue.length+'개 대기중';
  document.getElementById('remind-toast').classList.add('show');
}

function nextRemind(){
  remindQueue.shift();
  if(remindQueue.length<3) prefetchRemind();
  if(remindQueue.length===0){showToast('잠시 후 다시 눌러주세요');return;}
  displayRemind();
}

function closeRemind(){document.getElementById('remind-toast').classList.remove('show');}

// ── URL 자동 태그 ──
const URL_RULES=[
  {pattern:/youtube\.com|youtu\.be/i,tags:['유튜브']},
  {pattern:/instagram\.com/i,tags:['인스타그램']},
  {pattern:/threads\.(net|com)/i,tags:['스레드']},
  {pattern:/tiktok\.com/i,tags:['틱톡']},
  {pattern:/pinterest\.|pin\.it/i,tags:['핀터레스트','이미지']},
  {pattern:/twitter\.com|x\.com/i,tags:['트위터']},
  {pattern:/facebook\.com/i,tags:['페이스북']},
  {pattern:/vimeo\.com/i,tags:['비메오']},
  {pattern:/blog\.naver|naver\.com\/blog/i,tags:['블로그']},
  {pattern:/tistory\.com/i,tags:['블로그']},
  {pattern:/brunch\.co\.kr/i,tags:['브런치','블로그']},
  {pattern:/medium\.com/i,tags:['미디엄','블로그']},
  {pattern:/notion\.so/i,tags:['노션','문서']},
  {pattern:/docs\.google\.com/i,tags:['구글문서','문서']},
  {pattern:/behance\.net/i,tags:['비핸스','디자인']},
  {pattern:/dribbble\.com/i,tags:['드리블','디자인']},
  {pattern:/\.gif(\?|$)/i,tags:['GIF']},
  {pattern:/\.(jpg|jpeg|png|webp|svg)(\?|$)/i,tags:['이미지']},
  {pattern:/\.(mp4|mov|avi|webm)(\?|$)/i,tags:[]},
  {pattern:/\.pdf(\?|$)/i,tags:['PDF','문서']},
  {pattern:/\.(doc|docx|ppt|pptx|xls|xlsx)(\?|$)/i,tags:['문서']},
];
const ALL_AUTO_TAGS=new Set(URL_RULES.flatMap(r=>r.tags));
// 카드 타입과 중복되는 플랫폼 태그 (카드에 안 보이게, 검색/필터는 됨)
const HIDDEN_TAGS=new Set(['유튜브','인스타그램','스레드','틱톡','핀터레스트','트위터','페이스북','비메오','블로그','브런치','미디엄','노션','구글문서','비핸스','드리블']);
function detectTagsFromUrl(url){if(!url)return[];const d=new Set();URL_RULES.forEach(r=>{if(r.pattern.test(url))r.tags.forEach(t=>d.add(t));});return[...d];}

function onUrlInput(url){
  const detected=detectTagsFromUrl(url);
  document.getElementById('auto-tags-preview').innerHTML=detected.map(t=>`<span class="auto-tag-badge" style="background:${getTagColor(t)}">✦ ${t}</span>`).join('');
  currentTags=currentTags.filter(t=>!ALL_AUTO_TAGS.has(t));
  detected.forEach(t=>{if(!currentTags.includes(t))currentTags.push(t);});
  renderTagPills('tag-box',currentTags,'removeTag');
}
function onEditUrlInput(url){
  const detected=detectTagsFromUrl(url);
  editTags=editTags.filter(t=>!ALL_AUTO_TAGS.has(t));
  detected.forEach(t=>{if(!editTags.includes(t))editTags.push(t);});
  renderTagPills('edit-tag-box',editTags,'removeEditTag');
}

// ── 탭 ──
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');el.classList.add('active');
  // 탭 전환 시 태그 필터 접기 + 다시 그리기 (탭별로 다른 태그 보이게)
  const filterRow=document.getElementById('filter-row');
  if(filterRow){filterRow.classList.add('collapsed');renderFilterTags();}
  if(tab==='notes')loadNotes();
}

function showToast(msg){const t=document.getElementById('toast-msg');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ── 태그 ──
function renderTagPills(boxId,tags,removeFunc){
  const box=document.getElementById(boxId);const input=box.querySelector('.tag-input-real');
  box.querySelectorAll('.tag-pill').forEach(p=>p.remove());
  tags.forEach((tag,i)=>{const pill=document.createElement('span');pill.className='tag-pill';pill.style.background=getTagColor(tag);pill.innerHTML=`${escHtml(tag)}<button class="remove" onclick="${removeFunc}(${i})">×</button>`;box.insertBefore(pill,input);});
}
function tagBadgeHtml(tag){return`<span class="tag-badge" style="background:${getTagColor(tag)}">${escHtml(tag)}</span>`;}
function onTagInput(val){showTagDropdown('tag-dropdown',val,currentTags,addTag);}
function onTagKey(e){
  if(e.key==='Enter'||e.key===','||e.key===' '){e.preventDefault();const v=e.target.value.trim().replace(/,$/,'');if(v)addTag(v);}
  if(e.key==='Backspace'&&!e.target.value&&currentTags.length){currentTags.pop();renderTagPills('tag-box',currentTags,'removeTag');}
}
function onTagBlur(e){
  const input=e.target;
  // 150ms 지연: 드롭다운 항목 클릭이 먼저 처리되도록
  setTimeout(()=>{
    const v=input.value.trim().replace(/,$/,'');
    if(v){addTag(v);input.value='';}
  },150);
}
function addTag(tag){tag=tag.trim();if(!tag||currentTags.includes(tag))return;currentTags.push(tag);getTagColor(tag);renderTagPills('tag-box',currentTags,'removeTag');document.getElementById('tag-real').value='';document.getElementById('tag-dropdown').classList.remove('show');}
function removeTag(i){currentTags.splice(i,1);renderTagPills('tag-box',currentTags,'removeTag');}
function onEditTagInput(val){showTagDropdown('edit-tag-dropdown',val,editTags,addEditTag);}
function onEditTagKey(e){
  if(e.key==='Enter'||e.key===','||e.key===' '){e.preventDefault();const v=e.target.value.trim().replace(/,$/,'');if(v)addEditTag(v);}
  if(e.key==='Backspace'&&!e.target.value&&editTags.length){editTags.pop();renderTagPills('edit-tag-box',editTags,'removeEditTag');}
}
function onEditTagBlur(e){
  const input=e.target;
  setTimeout(()=>{
    const v=input.value.trim().replace(/,$/,'');
    if(v){addEditTag(v);input.value='';}
  },150);
}
function addEditTag(tag){tag=tag.trim();if(!tag||editTags.includes(tag))return;editTags.push(tag);getTagColor(tag);renderTagPills('edit-tag-box',editTags,'removeEditTag');document.getElementById('edit-tag-real').value='';document.getElementById('edit-tag-dropdown').classList.remove('show');}
function removeEditTag(i){editTags.splice(i,1);renderTagPills('edit-tag-box',editTags,'removeEditTag');}
function showTagDropdown(ddId,val,excludeTags,addFunc){
  const dd=document.getElementById(ddId);const tagMap=getTagMap();
  const sorted=Object.entries(tagMap).sort((a,b)=>b[1]-a[1]);
  const filtered=sorted.filter(([t])=>!excludeTags.includes(t)&&(!val||t.includes(val)));
  if(!filtered.length){dd.classList.remove('show');return;}
  dd.innerHTML=filtered.map(([tag,cnt])=>`<div class="tag-dropdown-item" onclick="${addFunc.name}('${tag}')"><span class="tag-dot" style="background:${getTagColor(tag)}"></span><span>${escHtml(tag)}</span><span class="tag-cnt">${cnt}</span></div>`).join('');
  dd.classList.add('show');
}
function getTagMap(){
  const m={};
  // 현재 활성 탭 확인
  const notesTabActive=document.getElementById('tab-notes')?.classList.contains('active');
  if(notesTabActive){
    // 메모 탭: 메모 태그만
    if(typeof allNotes!=='undefined'){
      allNotes.forEach(n=>{if(!n.tags)return;n.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>{m[t]=(m[t]||0)+1;});});
    }
  }else{
    // 링크 탭 (기본): 링크 + 메모 태그 둘 다
    allItems.forEach(item=>{if(!item.tags)return;item.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>{m[t]=(m[t]||0)+1;});});
    if(typeof allNotes!=='undefined'){
      allNotes.forEach(n=>{if(!n.tags)return;n.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>{m[t]=(m[t]||0)+1;});});
    }
  }
  return m;
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.tag-input-wrap'))document.querySelectorAll('.tag-dropdown').forEach(d=>d.classList.remove('show'));
  if(!document.body.contains(e.target))return;
  if(!e.target.closest('.search-wrap')){
    const fr=document.getElementById('filter-row');
    if(fr&&!fr.classList.contains('collapsed')){
      fr.classList.add('collapsed');
      document.getElementById('main-tabs').style.display='';
      // 필터 적용 안 됐을 때만 다시 5개로 (필터 적용 중이면 그대로 유지)
      if(!activeTagFilters.length){currentLimit=4;renderCards(allItems,{limit:currentLimit});}
      renderFilterTags();
    }
  }
});

// ── 저장 (낙관적 업데이트: 서버 응답 안 기다리고 즉시 화면 반영) ──
async function saveContent(){
  const url=document.getElementById('inp-url').value.trim();
  const title=document.getElementById('inp-title').value.trim();
  const memo=document.getElementById('inp-memo').value.trim();
  const tags=currentTags.join(', ');
  if(!url||!title){showToast('URL과 제목은 필수입니다');return;}
  const date=new Date().toISOString().slice(0,10);

  // 1. 화면에 바로 추가 (서버 응답 안 기다림)
  const newItem={url,title,tags,date,memo,_pending:true};
  allItems.unshift(newItem);
  if(newItem.tags)newItem.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>getTagColor(t));
  renderFilterTags();renderCards(allItems,{limit:currentLimit});

  // 2. 폼 즉시 비우기
  document.getElementById('inp-url').value='';
  document.getElementById('inp-title').value='';
  document.getElementById('inp-memo').value='';
  document.getElementById('auto-tags-preview').innerHTML='';
  currentTags=[];renderTagPills('tag-box',currentTags,'removeTag');
  showToast('✓ 저장 중...');

  // 3. 백그라운드로 서버에 저장
  try{
    await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,title,tags,date,memo})});
    // 성공: pending 플래그 제거만 (전체 리로드 안 함)
    newItem._pending=false;
    showToast('✓ 저장 완료');
  }catch(e){
    // 실패: 추가했던 항목 제거 + 토스트
    const idx=allItems.indexOf(newItem);

async function loadContent(){

  try{
    const cached=localStorage.getItem('muse_items_cache');
    if(cached){
      allItems=JSON.parse(cached);

      renderFilterTags();renderCards(allItems,{limit:currentLimit});
      hasCachedData=true;
    }
  }catch(e){}
  // 캐시 없으면 로딩 메시지
  if(!hasCachedData){
    document.getElementById('content-grid').innerHTML='<div class="status-msg"><span class="loading"></span> 불러오는 중...</div>';
  }
  // 2. 서버에서 새 데이터 받기 (백그라운드)
  try{
    const res=await fetch(API+'?action=get');
    allItems=await res.json();allItems.reverse();
    allItems.forEach(item=>{if(item.tags)item.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>getTagColor(t));});
    activeTagFilters=[];renderFilterTags();renderCards(allItems,{limit:currentLimit});
    // 3. 새 데이터를 캐시에 저장
    try{localStorage.setItem('muse_items_cache',JSON.stringify(allItems));}catch(e){}
    prefetchRemind();
  }catch(e){
    if(!hasCachedData)document.getElementById('content-grid').innerHTML='<div class="status-msg">불러오기 실패. 새로고침해주세요.</div>';
  }
}

// ── 필터 ──
function renderFilterTags(){
  const tagMap=getTagMap();const sorted=Object.entries(tagMap).sort((a,b)=>b[1]-a[1]);
  const row=document.getElementById('filter-row');
  const collapsed=row.classList.contains('collapsed');
  if(collapsed){row.innerHTML='';return;}
  let html=`<div style="width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span class="filter-label">태그로 필터링</span><div style="display:flex;gap:4px;">${activeTagFilters.length?`<button class="filter-toggle-btn" onclick="clearTagFilters()">전체 해제</button>`:''}<button class="filter-toggle-btn" onclick="toggleFilterRow()">✕ 닫기</button></div></div>`;
  row.innerHTML=html;
  if(!sorted.length){row.innerHTML+='<span style="color:var(--text2);font-size:12px;">아직 태그가 없습니다</span>';return;}
  sorted.forEach(([tag,cnt])=>{
    const c=getTagColor(tag);const chip=document.createElement('div');
    const isActive=activeTagFilters.includes(tag);
    chip.className='filter-chip'+(isActive?' active':'');
    if(!isActive){chip.style.background=c;chip.style.color='#fff';}
    chip.innerHTML=`${escHtml(tag)} <span style="opacity:.7">${cnt}</span>`;
    chip.onclick=(ev)=>{ev.stopPropagation();toggleFilter(tag);};row.appendChild(chip);
  });
}
function toggleFilter(tag){
  const idx=activeTagFilters.indexOf(tag);
  if(idx>-1)activeTagFilters.splice(idx,1);
  else activeTagFilters.push(tag);
  renderFilterTags();
  applyTagFilter();
}
function clearTagFilters(){activeTagFilters=[];renderFilterTags();applyTagFilter();}
function applyTagFilter(){
  if(!activeTagFilters.length){renderCards(allItems);return;}
  // AND 매칭: 선택한 태그 모두 포함하는 항목만
  const filtered=allItems.filter(item=>{
    if(!item.tags)return false;
    const itemTags=item.tags.split(',').map(t=>t.trim());
    return activeTagFilters.every(t=>itemTags.includes(t));
  });
  renderCards(filtered);
}
function toggleFilterRow(){
  const row=document.getElementById('filter-row');
  row.classList.toggle('collapsed');
  const collapsed=row.classList.contains('collapsed');
  document.getElementById('main-tabs').style.display=collapsed?'':'none';
  if(collapsed){currentLimit=4;renderCards(allItems,{limit:currentLimit});}else{renderCards(allItems);}
  renderFilterTags();
}
function expandFilterRow(){
  const row=document.getElementById('filter-row');
  if(row.classList.contains('collapsed')){
    row.classList.remove('collapsed');
    document.getElementById('main-tabs').style.display='none';
    renderCards(allItems);
    renderFilterTags();
  }
}

// ── 유틸 ──
function getType(url){
  if(!url)return'LINK';
  if(/youtube\.com|youtu\.be/i.test(url))return'YOUTUBE';
  if(/instagram\.com/i.test(url))return'INSTAGRAM';
  if(/threads\.(net|com)/i.test(url))return'THREADS';
  if(/tiktok\.com/i.test(url))return'TIKTOK';
  if(/pinterest\./i.test(url))return'PINTEREST';
  if(/twitter\.com|x\.com/i.test(url))return'TWITTER';
  if(/vimeo\.com/i.test(url))return'VIMEO';
  if(/behance\.net/i.test(url))return'BEHANCE';
  if(/dribbble\.com/i.test(url))return'DRIBBBLE';
  if(/tistory|naver.*blog|brunch|medium/i.test(url))return'BLOG';
  return'LINK';
}
function escHtml(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return'';const s=String(d);const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return`${m[1]}.${m[2]}.${m[3]}`;return s;}
function linkifyText(str){if(!str)return'';return escHtml(str).replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;word-break:break-all;">$1</a>');}

// 기존 localStorage 리뷰 데이터 정리 (v9에서 사용하던 키)
try{localStorage.removeItem('muse_reviews');}catch(e){}

// ── 공유 타겟 처리: URL 파라미터 파싱 ──
// Android 공유 시트에서 공유하면 ?url=... 또는 ?text=... 로 들어옴
(function handleShareTarget(){
  const params = new URLSearchParams(window.location.search);
  const sharedUrl = params.get('url');
  const sharedTitle = params.get('title');
  const sharedText = params.get('text');

  // url 파라미터 우선, 없으면 text에서 URL 추출 (text에 링크가 들어오는 경우가 많음)
  let finalUrl = sharedUrl || '';
  let finalTitle = sharedTitle || '';

  if(!finalUrl && sharedText){
    const match = sharedText.match(/https?:\/\/[^\s]+/);
    if(match) finalUrl = match[0];
    // 텍스트에서 URL 빼고 나머지를 제목 후보로
    const rest = sharedText.replace(/https?:\/\/[^\s]+/,'').trim();
    if(rest && !finalTitle) finalTitle = rest;
  }

  if(finalUrl){
    const urlInput = document.getElementById('inp-url');
    const titleInput = document.getElementById('inp-title');
    if(urlInput){
      urlInput.value = finalUrl;
      onUrlInput(finalUrl); // 자동 태그 감지 실행
    }
    if(titleInput && finalTitle) titleInput.value = finalTitle;

    // 폼으로 스크롤 + 제목 입력란 포커스 (제목이 비었으면)
    setTimeout(()=>{
      urlInput?.scrollIntoView({behavior:'smooth',block:'start'});
      if(titleInput && !titleInput.value) titleInput.focus();
    }, 100);

    // URL에서 파라미터 제거 (새로고침 시 중복 방지)
    history.replaceState(null, '', window.location.pathname);
  }
})();

// ── Service Worker 등록 (PWA 설치 가능하게) ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW 등록 실패:',e));
  });
}

loadContent();
